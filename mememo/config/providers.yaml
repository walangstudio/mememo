default_provider: passthrough

# Set to a real provider to enable LLM-powered memory extraction (capture tool).
# passthrough = no LLM calls; the calling model self-extracts when capture is invoked.

providers:
  anthropic:
    default_model: claude-haiku-4-5-20251001
    # api_key: sk-ant-...  (use ANTHROPIC_API_KEY env var instead)

  ollama:
    default_model: llama3.2
    base_url: http://localhost:11434

